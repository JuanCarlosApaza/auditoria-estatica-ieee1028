name: Auditoria Estatica Calidad

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Codigo fuente
        uses: actions/checkout@v3

      - name: Configurar Entorno .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Dar permisos de ejecucion al script
        run: chmod +x ./audit-script.sh

      - name: Ejecutar Script de Auditoria Automatizada
        run: ./audit-script.sh